version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SOCKET_URL=http://localhost:3001
    depends_on:
      - backend
      - realtime

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  realtime:
    build:
      context: ./realtime-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./realtime-server/.env
